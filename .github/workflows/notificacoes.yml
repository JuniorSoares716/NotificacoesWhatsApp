name: Notificacoes WhatsApp

on:
  schedule:
    # 11:00 UTC = 08:00 no horário de Brasília (UTC-3). Ajuste se quiser outro horário.
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm init -y && npm install firebase-admin

      - name: Enviar notificações
        run: node enviar-notificacoes.js
        env:
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          DIAS_AVISO: '3,2,1'

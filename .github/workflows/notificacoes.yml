name: Notificacoes WhatsApp

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm init -y && npm install firebase-admin

      - name: Enviar notificacoes
        run: node enviar-notificacoes.js
        env:
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          DIAS_AVISO: '3,2,1'
